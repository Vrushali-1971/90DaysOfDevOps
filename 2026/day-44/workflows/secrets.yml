name: Github Secrets task

on:
  workflow_dispatch:

jobs:
  secrets:
    runs-on: ubuntu-latest
    
    steps: 
      - name: Read Github Secret variable
        env:
          SECRET: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is NOT set"
          fi
      
  
