name: Download Artifacts Between Jobs 

on:
  workflow_dispatch:

jobs:
  job_1:
    runs-on: ubuntu-latest
      
    steps:
      - name: Generate a file
        run: echo "This is a test report" > report-1.txt
       
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Task_4
          path: report-1.txt
     
  job_2:
    needs: job_1
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Task_4
       
      - name: Debug files
        run: ls -R

      - name: Print artifact content
        run: cat report-1.txt
