name: Reusable Workflow — Build & Test

on: 
  workflow_call:
    inputs:
      python_version:
        description: 'Python version'
        required: true
        type: string
      run_tests:
        description: 'Run tests or not'
        required: false
        type: boolean
        default: true


jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capstone-project
    
    outputs:
      test_result: ${{ steps.set-result.outputs.result }}
   
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi

      - name: Start App
        run: |
          python app.py &
          sleep 5

      - name: Run Tests
        id: test-step
        if: ${{ inputs.run_tests }}
        run: |
          chmod +x test.sh
          ./test.sh
        continue-on-error: true

      - name: Set Output 
        id: set-result
        run: |
          if [ "${{ steps.test-step.outcome }}" == "success" ]; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi





