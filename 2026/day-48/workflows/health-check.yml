name: Scheduled Health Check

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest Docker image
        run: docker pull vrushalicloud/capstone-project:latest

      - name: Run Container
        run: |
          docker run -d -p 5000:5000 --name myapp vrushalicloud/capstone-project:latest

      - name: Wait for app to start
        run: sleep 5

      - name: Health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000)
          echo "HTTP status: $status"
        
          if [ "$status" -eq 200 ]; then
            echo "result=PASSED" >> $GITHUB_OUTPUT
          else
            echo "result=FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Stop and remove container
        if: always()
        run: |
          docker stop myapp || true
          docker rm myapp || true

      - name: Generate Summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: vrushalicloud/capstone-project:latest" >> $$GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY


