name: Main CI/CD Pipeline

on:
  push:
    branches: [main] 

permissions:
  contents: read          

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml 
    with: 
      python_version: "3.11"
      run_tests: true

  get-sha:
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Get short SHA
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  docker:
    needs: [build-test, get-sha]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "vrushalicloud/capstone-project"
      tag: sha-${{ needs.get-sha.outputs.short_sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Deploy Step
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }} to production"
      
      - name: Debug Docker Output
        run: |
          echo "Output is: ${{ needs.docker.outputs.image_url }}"
