name: My First Reusable Workflow

on:
  workflow_call:
    inputs:
      app_name:
        description: "Name of the application"
        required: true
        type: string
      
      environment:
        description: "Deployment environment"
        required: true
        default: staging
        type: string

    secrets:
      DOCKER_TOKEN:
        required: true      

    outputs:
      build_version:
        description: "Generated build version"
        value: ${{ jobs.Reusable.outputs.build_version }}

jobs:
  Reusable:
    runs-on: ubuntu-latest

    outputs:
      build_version: ${{ steps.version.outputs.build_version }}


    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          VERSION="v1.0-$SHORT_SHA"
          echo "build_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Print message
        run: |
          echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"
          echo "Generated version: ${{ steps.version.outputs.build_version }}"
           
       
      
