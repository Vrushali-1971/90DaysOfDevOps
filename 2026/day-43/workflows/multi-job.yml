name: Multi-Job Workflow

on: 
  workflow_dispatch:
  #  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build job
        run: echo "Building the app"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run tests
        run: echo "Running tests"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy application
        run: echo "Deploying"




