name: Job Outputs workflow

on:
  push:

jobs:
  job_1:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.get_date.outputs.date }}

    steps:
      - name: Print date
        id: get_date
        run: echo "date=$(date)" >> $GITHUB_OUTPUT
  
  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: Read previous job's output
        run: |
          echo "output: ${{ needs.job_1.outputs.today }}"

